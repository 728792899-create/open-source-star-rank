version: 2
updates:
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
      day: monday
      time: "01:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels: [dependencies, star-rank]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "01:45"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels: [dependencies, star-rank]

  - package-ecosystem: npm
    directory: /auth-worker
    schedule:
      interval: weekly
      day: monday
      time: "01:40"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels: [dependencies, star-rank, auth]
