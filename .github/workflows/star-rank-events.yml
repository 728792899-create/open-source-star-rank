name: Update and publish public event star rank

on:
  schedule:
    # 07:30 Asia/Shanghai, after the documented public Events API delay window.
    - cron: "30 23 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Validation, collection, recovery deployment, or explicit replacement
        type: choice
        options:
          - collect_publish
          - validate
          - deploy_existing
          - replace_day
        default: validate
      date:
        description: Optional Beijing ranking date; required for replace_day (YYYY-MM-DD)
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: open-source-star-rank-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
      models: read
    outputs:
      should_deploy: ${{ steps.mode.outputs.should_deploy }}
      run_mode: ${{ steps.mode.outputs.run_mode }}
    env:
      PYTHONUNBUFFERED: "1"
      ASTRO_TELEMETRY_DISABLED: "1"
      SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      BASE_PATH: /${{ github.event.repository.name }}
      PUBLIC_REPOSITORY: ${{ github.repository }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
    steps:
      - name: Checkout star rank
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0

      - name: Resolve run mode
        id: mode
        shell: bash
        env:
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mode="$REQUESTED_MODE"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then mode="collect_publish"; fi
          case "$mode" in
            validate) should_deploy=false ;;
            collect_publish|deploy_existing|replace_day) should_deploy=true ;;
            *) echo "Unsupported mode: $mode" >&2; exit 2 ;;
          esac
          echo "run_mode=$mode" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-star-rank.txt

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements-star-rank.txt
          npm ci --prefix site

      - name: Prepare isolated data branch worktree
        shell: bash
        env:
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}
        run: |
          set -euo pipefail
          data_dir="$RUNNER_TEMP/star-rank-data"
          if git fetch origin refs/heads/star-rank-data:refs/remotes/origin/star-rank-data; then
            git worktree add -B star-rank-data "$data_dir" refs/remotes/origin/star-rank-data
          elif [[ "$RUN_MODE" == "deploy_existing" ]]; then
            echo "star-rank-data does not exist; deploy_existing cannot continue" >&2
            exit 1
          else
            git worktree add --detach "$data_dir" HEAD
            git -C "$data_dir" switch --orphan star-rank-data
            git -C "$data_dir" rm -rf . 2>/dev/null || true
          fi
          echo "STAR_RANK_DATA_DIR=$data_dir" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud without a service-account key
        if: steps.mode.outputs.run_mode != 'deploy_existing'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Validate collectors
        run: python -m unittest discover -s tests -v

      - name: Collect public WatchEvent ranking
        if: steps.mode.outputs.run_mode != 'deploy_existing'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}
          RANKING_DATE: ${{ inputs.date }}
        shell: bash
        run: |
          set -euo pipefail
          args=(--data-dir "$STAR_RANK_DATA_DIR" --maximum-bytes-billed 25769803776 --top-limit 500 --metadata-attempt-limit 900 --api-request-budget 950 --category-pool-limit 1000)
          if [[ -n "$RANKING_DATE" ]]; then args+=(--date "$RANKING_DATE"); fi
          if [[ "$RUN_MODE" == "validate" ]]; then args+=(--validate-only); fi
          if [[ "$RUN_MODE" == "replace_day" ]]; then
            if [[ -z "$RANKING_DATE" ]]; then echo "date is required for replace_day" >&2; exit 2; fi
            args+=(--replace-day)
          fi
          python -m tools.event_star_rank "${args[@]}"

      - name: Localize newly ranked repositories
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_day'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCALIZATION_MODEL: ${{ vars.LOCALIZATION_MODEL || 'openai/gpt-4.1-mini' }}
          LOCALIZATION_MAX_PROJECTS: ${{ vars.LOCALIZATION_MAX_PROJECTS || '500' }}
        run: >-
          python -m tools.localize_repositories
          --data-dir "$STAR_RANK_DATA_DIR"
          --overrides-file data/localization-overrides.zh-CN.json

      - name: Classify newly ranked repositories
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_day'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLASSIFICATION_MODEL: ${{ vars.CLASSIFICATION_MODEL || 'openai/gpt-4.1-mini' }}
          CLASSIFICATION_MAX_PROJECTS: ${{ vars.CLASSIFICATION_MAX_PROJECTS || '500' }}
        run: >-
          python -m tools.classify_repositories
          --data-dir "$STAR_RANK_DATA_DIR"
          --taxonomy-file data/classification-taxonomy.zh-CN.json
          --overrides-file data/classification-overrides.zh-CN.json

      - name: Validate staged data contracts
        run: python tools/validate_star_rank_data.py --data-dir "$STAR_RANK_DATA_DIR" --sync-schemas

      - name: Test and build site
        working-directory: site
        run: |
          npm test
          STAR_RANK_DATA_DIR="$STAR_RANK_DATA_DIR/public" npm run check
          STAR_RANK_DATA_DIR="$STAR_RANK_DATA_DIR/public" npm run build
          npm run validate-build

      - name: Commit validated event data
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_day'
        shell: bash
        run: |
          set -euo pipefail
          git -C "$STAR_RANK_DATA_DIR" config user.name "github-actions[bot]"
          git -C "$STAR_RANK_DATA_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$STAR_RANK_DATA_DIR" add state/events state/localization state/classification public/events public/i18n public/classification public/schema
          if ! git -C "$STAR_RANK_DATA_DIR" diff --cached --quiet; then
            git -C "$STAR_RANK_DATA_DIR" commit -m "Update public event star rank"
            git -C "$STAR_RANK_DATA_DIR" push origin HEAD:star-rank-data
          fi

      - name: Upload GitHub Pages artifact
        if: steps.mode.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  incident:
    if: always() && (github.event_name == 'schedule' || inputs.mode != 'validate')
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Open or close public event incident
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULT: ${{ needs.build.result }}/${{ needs.deploy.result }}
          RUN_MODE: ${{ needs.build.outputs.run_mode }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ "$RESULT" == "success/success" ]]; then
            if [[ "$RUN_MODE" == "deploy_existing" ]]; then
              echo "deploy_existing 不改变事件数据新鲜度，保留现有故障 Issue 状态。"
            else
              python tools/star_rank_incident.py --status close --title "[开源星榜] 公共事件榜故障" --label "star-rank-events-incident" --details "事件榜工作流已恢复：$RESULT；$RUN_URL"
            fi
          else
            python tools/star_rank_incident.py --status open --title "[开源星榜] 公共事件榜故障" --label "star-rank-events-incident" --details "事件榜工作流：$RESULT；$RUN_URL"
          fi
