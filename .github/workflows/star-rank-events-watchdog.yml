name: Monitor public event star rank freshness

on:
  schedule:
    # 08:15 Asia/Shanghai.
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          fetch-depth: 0
      - name: Compare data branch and published event index
        env:
          SITE_INDEX: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/data/events/index.json
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin refs/heads/star-rank-data:refs/remotes/origin/star-rank-data
          git show refs/remotes/origin/star-rank-data:public/events/index.json > "$RUNNER_TEMP/data-event-index.json"
          latest_date="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["latest_date"])' "$RUNNER_TEMP/data-event-index.json")"
          git show "refs/remotes/origin/star-rank-data:public/events/daily/$latest_date.json" > "$RUNNER_TEMP/data-event-daily.json"
          python tools/check_star_rank_freshness.py --index "$RUNNER_TEMP/data-event-index.json" --daily "$RUNNER_TEMP/data-event-daily.json" --require-yesterday-date --require-complete-event-coverage
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/site-event-index.json" "$SITE_INDEX"
          curl --fail --location --retry 3 --output "$RUNNER_TEMP/site-event-daily.json" "${SITE_INDEX%index.json}daily/$latest_date.json"
          python tools/check_star_rank_freshness.py --index "$RUNNER_TEMP/site-event-index.json" --daily "$RUNNER_TEMP/site-event-daily.json" --require-yesterday-date --require-complete-event-coverage
          cmp "$RUNNER_TEMP/data-event-index.json" "$RUNNER_TEMP/site-event-index.json"
          cmp "$RUNNER_TEMP/data-event-daily.json" "$RUNNER_TEMP/site-event-daily.json"

  incident:
    if: always()
    needs: freshness
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Open or close public event freshness incident
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESULT: ${{ needs.freshness.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ "$RESULT" == "success" ]]; then status=close; else status=open; fi
          python tools/star_rank_incident.py --status "$status" --title "[开源星榜] 公共事件榜故障" --label "star-rank-events-incident" --details "08:15 新鲜度检查：$RESULT；$RUN_URL"
