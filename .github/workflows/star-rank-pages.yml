name: Update and publish Open Source Star Rank

on:
  schedule:
    # 00:20 Asia/Shanghai. Scheduled workflows may start later under GitHub load.
    - cron: "20 16 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: Validation, collection, recovery deployment, or confirmed replacement
        type: choice
        options:
          - collect_publish
          - validate
          - deploy_existing
          - replace_snapshot
        default: collect_publish
      snapshot_date:
        description: Required for replace_snapshot; must equal today's Beijing date (YYYY-MM-DD)
        type: string
        required: false
      data_ref:
        description: Optional star-rank-data commit SHA for deploy_existing recovery
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: open-source-star-rank-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      models: read
    outputs:
      should_deploy: ${{ steps.mode.outputs.should_deploy }}
      run_mode: ${{ steps.mode.outputs.run_mode }}
    env:
      PYTHONUNBUFFERED: "1"
      ASTRO_TELEMETRY_DISABLED: "1"
      SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
      BASE_PATH: /${{ github.event.repository.name }}
      PUBLIC_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout star rank
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Resolve run mode
        id: mode
        shell: bash
        env:
          REQUESTED_MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          mode="$REQUESTED_MODE"
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            mode="collect_publish"
          fi
          case "$mode" in
            validate)
              should_deploy=false
              ;;
            collect_publish|deploy_existing|replace_snapshot)
              should_deploy=true
              ;;
            *)
              echo "Unsupported mode: $mode" >&2
              exit 2
              ;;
          esac
          echo "run_mode=$mode" >> "$GITHUB_OUTPUT"
          echo "should_deploy=$should_deploy" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-star-rank.txt

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install validation dependencies
        run: python -m pip install --requirement requirements-star-rank.txt

      - name: Prepare isolated data branch worktree
        shell: bash
        env:
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}
          DATA_REF: ${{ inputs.data_ref }}
        run: |
          set -euo pipefail
          data_dir="$RUNNER_TEMP/star-rank-data"
          if git fetch origin refs/heads/star-rank-data:refs/remotes/origin/star-rank-data; then
            if [[ "$RUN_MODE" == "deploy_existing" && -n "$DATA_REF" ]]; then
              if [[ ! "$DATA_REF" =~ ^[0-9a-fA-F]{40}$ ]]; then
                echo "data_ref must be a full 40-character commit SHA" >&2
                exit 2
              fi
              resolved_ref="$(git rev-parse --verify --end-of-options "$DATA_REF^{commit}")"
              git merge-base --is-ancestor "$resolved_ref" refs/remotes/origin/star-rank-data
              git worktree add --detach "$data_dir" "$resolved_ref"
            else
              git worktree add -B star-rank-data "$data_dir" refs/remotes/origin/star-rank-data
            fi
          elif [[ "$RUN_MODE" == "deploy_existing" ]]; then
            echo "star-rank-data does not exist; deploy_existing cannot continue" >&2
            exit 1
          else
            git worktree add --detach "$data_dir" HEAD
            git -C "$data_dir" switch --orphan star-rank-data
            git -C "$data_dir" rm -rf . 2>/dev/null || true
          fi
          echo "STAR_RANK_DATA_DIR=$data_dir" >> "$GITHUB_ENV"

      - name: Run collector and contract tests
        run: python -m unittest discover -s tests -v

      - name: Collect daily snapshot
        if: steps.mode.outputs.run_mode != 'deploy_existing'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_MODE: ${{ steps.mode.outputs.run_mode }}
          SNAPSHOT_DATE: ${{ inputs.snapshot_date }}
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --data-dir "$STAR_RANK_DATA_DIR"
            --seed-repositories-file data/seed-repositories.json
            --max-candidates 2000
          )
          if [[ "$RUN_MODE" == "replace_snapshot" ]]; then
            if [[ -z "$SNAPSHOT_DATE" ]]; then
              echo "snapshot_date is required for replace_snapshot" >&2
              exit 2
            fi
            args+=(--replace-snapshot --replace-date "$SNAPSHOT_DATE")
          fi
          if [[ "$RUN_MODE" != "validate" ]]; then
            args+=(--require-valid-capture)
          fi
          python -m tools.star_rank "${args[@]}"

      - name: Localize newly ranked repositories
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_snapshot'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LOCALIZATION_MODEL: ${{ vars.LOCALIZATION_MODEL || 'openai/gpt-4.1-mini' }}
          LOCALIZATION_MAX_PROJECTS: ${{ vars.LOCALIZATION_MAX_PROJECTS || '200' }}
        run: >-
          python -m tools.localize_repositories
          --data-dir "$STAR_RANK_DATA_DIR"
          --overrides-file data/localization-overrides.zh-CN.json

      - name: Classify newly ranked repositories
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_snapshot'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLASSIFICATION_MODEL: ${{ vars.CLASSIFICATION_MODEL || 'openai/gpt-4.1-mini' }}
          CLASSIFICATION_MAX_PROJECTS: ${{ vars.CLASSIFICATION_MAX_PROJECTS || '200' }}
        run: >-
          python -m tools.classify_repositories
          --data-dir "$STAR_RANK_DATA_DIR"
          --taxonomy-file data/classification-taxonomy.zh-CN.json
          --overrides-file data/classification-overrides.zh-CN.json

      - name: Validate staged data contracts
        run: python tools/validate_star_rank_data.py --data-dir "$STAR_RANK_DATA_DIR" --sync-schemas

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Test and type-check site
        working-directory: site
        run: |
          npm test
          STAR_RANK_DATA_DIR="$STAR_RANK_DATA_DIR/public" npm run check

      - name: Build and validate static site
        working-directory: site
        run: |
          STAR_RANK_DATA_DIR="$STAR_RANK_DATA_DIR/public" npm run build
          npm run validate-build

      - name: Commit validated data branch
        if: steps.mode.outputs.run_mode == 'collect_publish' || steps.mode.outputs.run_mode == 'replace_snapshot'
        shell: bash
        run: |
          set -euo pipefail
          git -C "$STAR_RANK_DATA_DIR" config user.name "github-actions[bot]"
          git -C "$STAR_RANK_DATA_DIR" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$STAR_RANK_DATA_DIR" add state snapshots public
          if ! git -C "$STAR_RANK_DATA_DIR" diff --cached --quiet; then
            git -C "$STAR_RANK_DATA_DIR" commit -m "Update star rank snapshot"
            git -C "$STAR_RANK_DATA_DIR" push origin HEAD:star-rank-data
          fi

      - name: Upload GitHub Pages artifact
        if: steps.mode.outputs.should_deploy == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/dist

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  incident:
    if: >-
      always() &&
      (github.event_name == 'schedule' || inputs.mode != 'validate')
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout incident helper
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Open or close incident
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          RUN_MODE: ${{ needs.build.outputs.run_mode }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$BUILD_RESULT" == "success" && "$DEPLOY_RESULT" == "success" ]]; then
            if [[ "$RUN_MODE" == "deploy_existing" ]]; then
              echo "deploy_existing 不改变采样新鲜度，保留现有故障 Issue 状态。"
            else
              python tools/star_rank_incident.py --status close --details "采集和部署已恢复：$RUN_URL"
            fi
          else
            python tools/star_rank_incident.py --status open --details "build=$BUILD_RESULT, deploy=$DEPLOY_RESULT；运行记录：$RUN_URL"
          fi
