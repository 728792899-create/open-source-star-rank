name: Validate or deploy GitHub auth worker

on:
  pull_request:
    paths:
      - "auth-worker/**"
      - ".github/workflows/star-rank-auth-worker.yml"
  push:
    branches: [main]
    paths:
      - "auth-worker/**"
      - ".github/workflows/star-rank-auth-worker.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy the validated worker to Cloudflare
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: star-rank-auth-worker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: auth-worker/package-lock.json

      - name: Install and validate
        working-directory: auth-worker
        run: |
          npm ci
          npm run check
          npm test
          npx wrangler deploy --dry-run

      - name: Deploy worker
        if: github.event_name == 'workflow_dispatch' && inputs.deploy
        working-directory: auth-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
